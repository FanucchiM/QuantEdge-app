spring.application.name=stock-analyzer-api

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/stockanalyzer}
spring.datasource.username=${DB_USERNAME:quantedge}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Server Configuration
server.port=${PORT:${SERVER_PORT:8081}}
app.jwt.secret=${JWT_SECRET:quantedge-default-secret-key-change-in-production-2026}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Analytics Service Configuration
analytics.service.url=${ANALYTICS_URL:http://localhost:8000}

# Signal History Configuration
app.signal.history-days=${SIGNAL_HISTORY_DAYS:365}

# Disable default security
spring.security.user.name=
spring.security.user.password=
