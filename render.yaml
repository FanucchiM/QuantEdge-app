services:
  # Java API Service
  - name: quantedge-api
    type: docker
    repo: https://github.com/FanucchiM/quantedge
    branch: main
    dockerfilePath: api-service/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8081"
      - key: DATABASE_URL
        sync: false  # Set this in Render dashboard after creating PostgreSQL
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: "update"
      - key: ANALYTICS_SERVICE_URL
        value: https://quantedge-analytics.onrender.com
      - key: JWT_SECRET
        sync: false  # Generate and set this manually
      - key: CORS_ORIGINS
        value: "https://quantedge-frontend.onrender.com"

  # Angular Frontend
  - name: quantedge-frontend
    type: docker
    repo: https://github.com/FanucchiM/quantedge
    branch: main
    dockerfilePath: frontend/Dockerfile
    dockerContext: .

databases:
  - name: quantedge-db
    type: postgres
    plan: free
    region: oregon